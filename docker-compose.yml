version: '3.8'

services:
  fraud-detection:
    build:
      context: .
      dockerfile: Dockerfile
    
    ports:
      - "8501:8501"
    
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    
    environment:
      - STREAMLIT_SERVER_PRODUCTION=true
      - STREAMLIT_LOGGER_LEVEL=info
      - STREAMLIT_CLIENT_TOOLBAR_MODE=minimal
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  default:
    driver: bridge
